<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LokMate – Multilingual, voice-first Election Process Education platform for Indian voters. Ask about Form 6, Form 8, EVM usage and more." />
    <meta name="theme-color" content="#f97316" />
    <title>LokMate – Your Voice. Your Vote.</title>
    <!-- Preload Inter and Noto Sans Devanagari for multilingual support -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Firebase Analytics (Google Services Integration) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics.js";
      const firebaseConfig = {
        apiKey: "demo-api-key-for-hackathon",
        authDomain: "lokmate-demo.firebaseapp.com",
        projectId: "lokmate-demo",
        storageBucket: "lokmate-demo.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef",
        measurementId: "G-ABCDEF123"
      };
      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
    </script>
  </body>
